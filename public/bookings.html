<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bookings — Need-A-Cab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0b0d10; --card:#12161c; --ink:#e9eef4; --muted:#9bb0c2; --line:#202630;
      --ok:#1ea672; --warn:#e7a03c; --err:#d23f3f; --brand:#f6c423; --chip:#1b222c;
      --btn:#151b22; --btnHover:#1b2330; --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 system-ui,Segoe UI,Roboto,Arial}
    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;top:0;z-index:10;
      display:flex;align-items:center;gap:16px;
      padding:10px 16px;background:rgba(11,13,16,0.96);
      border-bottom:1px solid #111827;
      backdrop-filter:blur(12px);
    }
    .navbar a{
      padding:6px 10px;border-radius:999px;
      font-size:13px;color:var(--muted);
    }
    .navbar a.active{
      background:rgba(246,196,35,0.1);color:var(--brand);font-weight:600;
    }

    .wrap{
      max-width:1200px;margin:18px auto;padding:0 12px 24px;
      display:flex;flex-direction:column;gap:16px;
    }
    .card{
      background:var(--card);border-radius:var(--radius);
      border:1px solid #1f2937;padding:14px 14px 12px;
      box-shadow:0 18px 45px rgba(0,0,0,0.55);
    }

    h1{font-size:20px;margin:0 0 4px}
    .muted{color:var(--muted);font-size:13px}

    .toolbar{
      display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;
      margin-top:8px;
    }
    .toolbar .group{
      display:flex;flex-direction:column;gap:4px;font-size:13px;
    }
    label{font-size:13px;color:var(--muted)}
    select,input[type="date"]{
      background:var(--btn);color:var(--ink);border-radius:10px;
      border:1px solid var(--line);padding:7px 10px;
      min-height:36px;font:inherit;
    }
    select:focus,input[type="date"]:focus{outline:none;border-color:#334155}

    button{
      background:var(--btn);color:var(--ink);border-radius:999px;
      border:1px solid #263445;padding:8px 12px;font:inherit;cursor:pointer;
    }
    button:hover{background:var(--btnHover)}
    button.ghost{background:transparent}

    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{border-bottom:1px solid var(--line);padding:10px 6px;vertical-align:top}
    th{text-align:left;font-size:12px;color:var(--muted);font-weight:600;background:#111827}
    tr:hover td{background:#0e141c}
    /* Highlight potential duplicate rows */
    tr.duplicate td{background:#2b1a1a;}
    .dupTag{
      display:inline-flex;
      padding:2px 6px;
      border-radius:999px;
      background:#7f1d1d;
      color:#fecaca;
      font-size:10px;
      font-weight:600;
      align-self:flex-start;
    }
    /* Make the calendar icon visible on dark background */
    input[type="date"]::-webkit-calendar-picker-indicator{
      filter: invert(1);
      cursor: pointer;
    }
    .ref{display:flex;flex-direction:column;gap:2px}
    .shortRef{font-weight:700}
    .legacyRef{font-size:11px;color:var(--muted)}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;
    }
    .pill.pending{background:#1f2937;color:#e5e7eb;border:1px solid #4b5563}
    .pill.approved{background:rgba(30,166,114,0.18);color:#6ee7b7;border:1px solid #22c55e}
    .pill.declined{background:rgba(210,63,63,0.14);color:#fecaca;border:1px solid #f87171}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;padding:1px 7px;font-size:11px;font-weight:500;
      background:#111827;color:#9ca3af;border:1px solid #374151;
    }
    .row{display:flex;align-items:center;gap:8px}
    .row > *{flex:1}
    .row .right{justify-content:flex-end}

    .staff{font-size:13px;display:flex;flex-direction:column;gap:2px}
    .staff span{color:var(--muted);font-size:12px}
    .trip{font-size:13px}
    .trip span{display:block}
    .zones{font-size:12px;color:var(--muted)}

    .actions{white-space:nowrap}
    .actions button{font-size:12px;padding:6px 8px;margin-right:4px;border-radius:999px}
    .btn-approve{border-color:#1ea672}
    .btn-decline{border-color:#d23f3f}
    .btn-delete{border-color:#4b5563;color:#9ca3af}

    #empty{
      text-align:center;padding:20px 6px;font-size:14px;color:var(--muted);
    }

    #toast{
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
      background:#111827;color:#e5e7eb;padding:8px 14px;border-radius:999px;
      border:1px solid #1f2937;font-size:13px;opacity:0;pointer-events:none;
      transition:opacity 0.18s ease-out,transform 0.18s ease-out;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      z-index:50;
    }
    #toast.show{
      opacity:1;transform:translateX(-50%) translateY(-4px);
    }

    @media (max-width:768px){
      .toolbar{flex-direction:column;align-items:stretch}
      .toolbar .row{width:100%;justify-content:space-between}
      .actions button{margin-bottom:4px}
      th:nth-child(2),td:nth-child(2){min-width:160px}
      th:nth-child(5),td:nth-child(5){min-width:140px}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/">Home</a>
    <a href="/admin">Admin</a>
    <a href="/staff_booker.html">Staff Booker</a>
    <a href="/chat">Chat Booker</a>
    <a href="/bookings" class="active">Bookings</a>
  </nav>

  <div class="wrap">
    <header class="card">
      <h1>Derriford Staff Taxi — Bookings</h1>
      <p class="muted">Filter, approve, decline and export bookings. Pending view shows only unprocessed records.</p>

      <div class="toolbar">
        <div class="row" style="gap:10px;flex-wrap:wrap">
          <div class="group">
            <label for="statusSel">Status</label>
            <select id="statusSel">
              <option value="">All</option>
              <option value="pending">Pending only</option>
              <option value="approved">Approved</option>
              <option value="declined">Declined</option>
            </select>
          </div>
          <div class="group">
            <label for="dateFrom">From</label>
            <input type="date" id="dateFrom" />
          </div>
          <div class="group">
            <label for="dateTo">To</label>
            <input type="date" id="dateTo" />
          </div>
        </div>
        <div class="row right">
          <button id="refreshBtn" class="ghost">Refresh</button>
          <a id="csvLink" href="#" download="bookings_export.csv">
            <button class="ghost">Export CSV</button>
          </a>
        </div>
      </div>
      <p id="totalCount" class="muted" style="margin-top:6px;font-size:12px;">Total: 0</p>
    </header>

    <div class="card">
      <table id="bookingsTbl">
        <thead>
          <tr>
            <th>Ref</th>
            <th>Ward &amp; Staff</th>
            <th>Date &amp; Time</th>
            <th>Zone</th>
            <th>Trip</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" style="display:none;">No bookings found for the current filter.</div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const api = (location.hostname === "localhost" || location.hostname === "127.0.0.1") ? "http://localhost:4000" : "";

    const tbody = document.getElementById("tbody");
    const statusSel = document.getElementById("statusSel");
    const refreshBtn = document.getElementById("refreshBtn");
    const empty = document.getElementById("empty");
    const csvLink = document.getElementById("csvLink");
    const toastEl = document.getElementById("toast");
    const dateFromEl = document.getElementById("dateFrom");
    const dateToEl = document.getElementById("dateTo");
    const totalEl = document.getElementById("totalCount");

    // Will hold IDs of potential duplicate bookings for highlighting
    let duplicateIdSet = new Set();

    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(()=>toastEl.classList.remove("show"), 2200);
    }
    function esc(s){ return String(s ?? "").replace(/[<>&]/g, c => (
      c === "<" ? "&lt;" : c === ">" ? "&gt;" : "&amp;"
    )); }

    function toDDMMYY(iso){
      if(!iso) return "";
      const [y,m,d] = String(iso).split("-");
      if(!y||!m||!d) return iso;
      return `${d}-${m}-${y.slice(-2)}`;
    }

    function statusChip(status){
      const s = (status||"").toLowerCase();
      if(!s) return `<span class="pill pending">Pending</span>`;
      if(s==="approved") return `<span class="pill approved">Approved</span>`;
      if(s==="declined") return `<span class="pill declined">Declined</span>`;
      return `<span class="pill">${esc(status)}</span>`;
    }

    function fmtWardStaff(b){
      const ward = b.wardName || "Unknown ward";
      const staff = b.staffName || "";
      const phone = b.staffPhone || "";
      const wardPhone = b.wardPhone || "";
      return `<div class="staff">
        <strong>${esc(ward)}</strong>
        ${staff ? `<span>${esc(staff)}</span>` : ""}
        ${phone ? `<span>Staff: ${esc(phone)}</span>` : ""}
        ${wardPhone ? `<span>Ward: ${esc(wardPhone)}</span>` : ""}
      </div>`;
    }

    function fmtDateTime(b){
      const date = toDDMMYY(b.pickupDateISO);
      const time = b.onOffDutyTime || "";
      const shift = b.shiftType === "finish" ? "Finish" : "Start";
      return `<div>
        <div>${date || "—"} ${time ? " @ " + esc(time) : ""}</div>
        <div><span class="badge">${shift}</span></div>
      </div>`
    }

    function fmtZones(b){
      const pz = b.pickup && b.pickup.zone && b.pickup.zone.name ? b.pickup.zone.name : "";
      const dz = b.destination && b.destination.zone && b.destination.zone.name ? b.destination.zone.name : "";
      return `<div class="zones">
        ${pz ? `From: ${esc(pz)}` : ""}
        ${dz ? `<br>To: ${esc(dz)}` : ""}
      </div>`;
    }

    function fmtTrip(b){
      const p = b.pickup && b.pickup.formatted ? b.pickup.formatted : "";
      const d = b.destination && b.destination.formatted ? b.destination.formatted : "";
      return `<div class="trip">
        <span>${esc(p)}</span>
        <span>➜ ${esc(d)}</span>
      </div>`;
    }

    function renderRow(b){
      const isDup = duplicateIdSet && duplicateIdSet.has(String(b._id));
      const refBlock = `
        <div class="ref">
          <span class="shortRef">${esc(b.shortRef || "—")}</span>
          <span class="legacyRef">${esc(b.reference || "")}</span>
          ${isDup ? `<span class="dupTag">DUPLICATE</span>` : ""}
        </div>`;
      const actApprove = `<button class="btn-approve" data-act="approve" data-id="${b._id}">Accept</button>`;
      const actDecline = `<button class="btn-decline" data-act="decline" data-id="${b._id}">Decline</button>`;
      const actDelete  = `<button class="btn-delete"  data-act="delete"  data-id="${b._id}">Delete</button>`;

      const rowClass = isDup ? ' class="duplicate"' : "";

      return `<tr data-id="${b._id}"${rowClass}>
        <td>${refBlock}</td>
        <td>${fmtWardStaff(b)}</td>
        <td>${fmtDateTime(b)}</td>
        <td>${fmtZones(b)}</td>
        <td>${fmtTrip(b)}</td>
        <td>${statusChip(b.status)}</td>
        <td class="actions">${actApprove} ${actDecline} ${actDelete}</td>
      </tr>`;
    }

    function toCSV(items){
      const header = [
        "pickupDateISO","onOffDutyTime","shiftType","wardName","staffName","staffPhone",
        "pickup.formatted","pickup.zone.name","destination.formatted","destination.zone.name",
        "reference","requireReturn","isReturn","status","shortRef","declineReason"
      ];
      const rows = items.map(b => [
        b.pickupDateISO || "",
        b.onOffDutyTime || "",
        b.shiftType || "",
        b.wardName || "",
        b.staffName || "",
        b.staffPhone || "",
        (b.pickup && b.pickup.formatted) || "",
        (b.pickup && b.pickup.zone && b.pickup.zone.name) || "",
        (b.destination && b.destination.formatted) || "",
        (b.destination && b.destination.zone && b.destination.zone.name) || "",
        b.reference || "",
        String(b.requireReturn ?? ""),
        String(b.isReturn ?? ""),
        b.status || "",
        b.shortRef || "",
        b.declineReason || ""
      ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(","));
      return [header.join(","), ...rows].join("\n");
    }

    async function load(){
      const wantsPending = statusSel.value === "pending";
      const qs = new URLSearchParams();
      if (!wantsPending && statusSel.value) qs.set("status", statusSel.value);
      if (dateFromEl && dateFromEl.value) qs.set("dateFrom", dateFromEl.value);
      if (dateToEl && dateToEl.value) qs.set("dateTo", dateToEl.value);
      qs.set("limit", "200");
      const url = `${api}/api/bookings?${qs.toString()}`;

      tbody.innerHTML = "";
      empty.style.display = "none";
      if (totalEl) totalEl.textContent = "";

      try{
        const r = await fetch(url);
        if(!r.ok) throw new Error("Failed to load bookings");
        const data = await r.json();
        let items = data.items || [];

        if (wantsPending) {
          items = items.filter(b =>
            (b.status === "pending") ||
            b.status === undefined ||
            b.status === null ||
            b.status === ""
          );
        }

        // Identify potential duplicate bookings:
        // same staff phone, date, time, pickup and destination
        duplicateIdSet = new Set();
        const dupGroups = new Map();
        for (const b of items) {
          const key = [
            (b.staffPhone || "").trim(),
            b.pickupDateISO || "",
            b.onOffDutyTime || "",
            b.pickup && b.pickup.formatted ? b.pickup.formatted : "",
            b.destination && b.destination.formatted ? b.destination.formatted : ""
          ].join("||");
          const list = dupGroups.get(key) || [];
          list.push(b);
          dupGroups.set(key, list);
        }
        for (const list of dupGroups.values()) {
          if (list.length > 1) {
            for (const b of list) {
              if (b && b._id) duplicateIdSet.add(String(b._id));
            }
          }
        }

        if (totalEl) totalEl.textContent = `Total: ${items.length}`;

        if (items.length === 0){
          empty.style.display = "block";

          // Even with no items, keep CSV export consistent
          const csvText = toCSV(items);
          const blob = new Blob([csvText], { type: "text/csv;charset=utf-8" });
          const urlObj = URL.createObjectURL(blob);
          csvLink.href = urlObj;
          csvLink.download = wantsPending ? "bookings_pending.csv" : "bookings_export.csv";

          return;
        }

        const frag = document.createDocumentFragment();
        for (const b of items){
          const tr = document.createElement("tr");
          tr.innerHTML = renderRow(b);
          frag.appendChild(tr);
        }
        tbody.appendChild(frag);

        if (wantsPending) {
          const csvText = toCSV(items);
          const blob = new Blob([csvText], { type: "text/csv;charset=utf-8" });
          const urlObj = URL.createObjectURL(blob);
          csvLink.href = urlObj;
          csvLink.download = "bookings_pending.csv";
        } else {
          csvLink.href = `${api}/api/bookings/export?${qs.toString()}`;
          csvLink.download = "bookings_export.csv";
        }
      } catch (err){
        console.error(err);
        toast("Failed to load bookings");
        empty.style.display = "block";
        if (totalEl) totalEl.textContent = "Total: 0";
      }
    }

    function grabRowBooking(row){
      const id = row.getAttribute("data-id");
      const shortRefEl = row.querySelector(".shortRef");
      const legacyRefEl = row.querySelector(".legacyRef");
      const tripEl = row.querySelector(".trip");
      const staffEl = row.querySelector(".staff");
      const dateTimeEl = row.querySelector("td:nth-child(3)");
      const tripLines = (tripEl?.innerText || "").split("\n");
      const staffLines = (staffEl?.innerText || "").split("\n");
      const dateLine = (dateTimeEl?.innerText || "").split("\n")[0] || "";
      const [date, time] = dateLine.split("@").map(s => s.trim());
      const shortRef = shortRefEl?.innerText || "";
      const legacyRef = legacyRefEl?.innerText || "";
      const pick = (tripLines[0]||"").trim();
      const drop = (tripLines[1]||"").trim();
      return {
        _id:id,
        shortRef, reference: legacyRef, pickupDateISO: date, onOffDutyTime: time,
        pickup:{ formatted: pick }, destination:{ formatted: drop },
        staffName: staffLines[1] || ""
      };
    }

    function buildApproveMessage(row){
      const b = grabRowBooking(row);
      const dateNice = toDDMMYY(b.pickupDateISO);
      const timeNice = b.onOffDutyTime || "";
      return `Hi ${b.staffName || "there"}, your Christmas staff taxi booking for ${dateNice} at ${timeNice} has been approved. Your reference is ${b.shortRef || b.reference || "N/A"}. Thank you, Need-A-Cab Taxis.`;
    }

    function buildDeclineMessage(row, reason){
      const b = grabRowBooking(row);
      const dateNice = toDDMMYY(b.pickupDateISO);
      const timeNice = b.onOffDutyTime || "";
      return `Hi ${b.staffName || "there"}, unfortunately your Christmas staff taxi booking for ${dateNice} at ${timeNice} has been declined. Reason: ${reason}. — Need-A-Cab Taxis`;
    }

    async function approve(id, row){
      const r = await fetch(`${api}/api/bookings/${id}/approve`, { method:"PATCH" });
      const js = await r.json();
      if(!r.ok){ toast(js.error||"Approve failed"); return; }
      toast("Approved ✔");
      updateRowFromPayload(row, js.booking);
      const msg = buildApproveMessage(row);
      console.log("APPROVE SMS:", msg);
    }

    async function decline(id, row){
      const reason = prompt("Reason for declining?");
      if(reason === null) return;
      const trimmed = String(reason).trim();
      if (!trimmed){ toast("Decline reason required"); return; }

      const r = await fetch(`${api}/api/bookings/${id}/decline`, {
        method:"PATCH", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ reason: trimmed })
      });
      const js = await r.json();
      if(!r.ok){ toast(js.error||"Decline failed"); return; }
      toast("Declined ✖");
      updateRowFromPayload(row, js.booking);
      const msg = buildDeclineMessage(row, trimmed);
      console.log("DECLINE SMS:", msg);

      // After sending the decline SMS, automatically delete the booking
      await deleteBooking(id, row, { skipConfirm: true });
    }

    async function deleteBooking(id, row, opts = {}){
      const skipConfirm = opts && opts.skipConfirm;
      if(!skipConfirm){
        if(!confirm("Delete this booking? This cannot be undone.")) return;
      }
      const r = await fetch(`${api}/api/bookings/${id}`, { method:"DELETE" });
      const js = await r.json();
      if(!r.ok){ toast(js.error||"Delete failed"); return; }
      row.remove();
      if (!tbody.children.length) empty.style.display = "block";
      toast("Deleted 🗑");
    }

    function updateRowFromPayload(row, b){
      const cells = row.querySelectorAll("td");
      const wardCell = cells[1];
      const dateCell = cells[2];
      const zoneCell = cells[3];
      const tripCell = cells[4];

      wardCell.innerHTML = fmtWardStaff(b);
      dateCell.innerHTML = fmtDateTime(b);
      zoneCell.innerHTML = fmtZones(b);
      tripCell.innerHTML = fmtTrip(b);

      const refBlockEl = cells[0].querySelector(".ref");
      if (refBlockEl){
        refBlockEl.querySelector(".shortRef").textContent = b.shortRef || "—";
        refBlockEl.querySelector(".legacyRef").textContent = b.reference || "";
      }
      cells[5].innerHTML = statusChip(b.status);
    }

    tbody.addEventListener("click", (e)=>{
      const btn = e.target.closest("button");
      if(!btn) return;
      const id = btn.getAttribute("data-id");
      const row = btn.closest("tr");
      const act = btn.getAttribute("data-act");
      if (act === "approve") approve(id, row);
      else if (act === "decline") decline(id, row);
      else if (act === "delete") deleteBooking(id, row);
    });

    statusSel.addEventListener("change", load);
    refreshBtn.addEventListener("click", load);
    if (dateFromEl) dateFromEl.addEventListener("change", load);
    if (dateToEl) dateToEl.addEventListener("change", load);
    load();
  </script>
</body>
</html>
