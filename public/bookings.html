<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bookings — Need-A-Cab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg:#0b0d10; --card:#12161c; --ink:#e9eef4; --muted:#9bb0c2; --line:#202630;
      --ok:#1ea672; --warn:#e7a03c; --err:#d23f3f; --brand:#f6c423; --chip:#1b222c;
      --btn:#151b22; --btnHover:#1b2330; --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.45 system-ui,Segoe UI,Roboto,Arial}
    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;top:0;z-index:20;
      display:flex;justify-content:space-between;align-items:center;
      background:#0d1218;border-bottom:1px solid var(--line);padding:12px 20px;
    }
    .nav-left{display:flex;gap:16px;align-items:center}
    .nav-left a{padding:8px 12px;border-radius:10px;font-weight:600}
    .nav-left a:hover{background:#1a222d}
    .nav-left a.active{background:var(--brand);color:#111}

    .page{max-width:1100px;margin:22px auto;padding:0 16px}
    h1{font-size:22px;margin:0 0 14px}
    .muted{color:var(--muted);font-size:13px;}

    .tools{margin-bottom:10px}
    .row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    select, input[type="date"]{
      background:#111827;border-radius:10px;border:1px solid #253142;
      color:var(--ink);padding:7px 10px;font:inherit;min-width:130px;
    }
    button{
      background:var(--btn);color:var(--ink);border-radius:10px;border:1px solid #263445;
      padding:8px 12px;font:inherit;cursor:pointer;
    }
    button:hover{background:var(--btnHover)}
    button.ghost{background:transparent}

    table{width:100%;border-collapse:collapse;margin-top:6px}
    th,td{border-bottom:1px solid var(--line);padding:10px 6px;vertical-align:top}
    th{text-align:left;font-size:12px;color:var(--muted);font-weight:600;background:#111827}
    tr:hover td{background:#0e141c}
    .ref{display:flex;flex-direction:column;gap:2px}
    .shortRef{font-weight:700}
    .legacyRef{font-size:11px;color:var(--muted)}
    .pill{
      display:inline-flex;align-items:center;justify-content:center;
      padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;
    }
    .pill.pending{background:#1f2937;color:#fbbf24}
    .pill.approved{background:#022c22;color:#6ee7b7}
    .pill.declined{background:#2f1417;color:#fecaca}

    .trip{white-space:pre-line;font-size:13px}
    .staff{white-space:pre-line;font-size:13px}
    .zone{font-size:13px}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      padding:2px 8px;border-radius:999px;font-size:11px;background:#101827;color:#9ca3af;
    }
    .actions{display:flex;gap:6px;flex-wrap:wrap}
    .btn-approve{background:var(--ok);border-color:#16a34a;color:#041107}
    .btn-decline{background:#3b0b0b;border-color:#7f1d1d;color:#fecaca}
    .btn-delete{background:#111827;border-color:#374151;color:#e5e7eb}

    .statusbar{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .right{margin-left:auto}
    .empty{padding:30px;text-align:center;color:var(--muted)}
    .toast{
      position:fixed;right:16px;bottom:16px;background:#111a25;color:#e9eef4;
      border:1px solid #223044;padding:10px 14px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.35);
      opacity:0;transform:translateY(6px);transition:.18s ease;max-width:80vw
    }
    .toast.show{opacity:1;transform:translateY(0)}
    @media (max-width:720px){
      th:nth-child(4), td:nth-child(4){display:none}
      .actions{gap:4px}
      button{padding:8px 10px}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-left">
      <a href="/">Home</a>
      <a href="/admin">Admin</a>
      <a href="/staff_booker.html">Staff Booker</a>
      <a href="/chat">Chat Booker</a>
      <a href="/bookings" class="active">Bookings</a>
    </div>
  </nav>

  <div class="page">
    <h1>Bookings <span id="totalCount" class="muted"></span></h1>

    <div class="tools">
      <div class="statusbar row">
        <div class="row" style="gap:8px">
          <label for="statusSel" style="color:var(--muted)">Status</label>
          <select id="statusSel">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="declined">Declined</option>
          </select>
        </div>
        <div class="row" style="gap:8px">
          <label for="dateFrom" style="color:var(--muted)">From</label>
          <input type="date" id="dateFrom" />
        </div>
        <div class="row" style="gap:8px">
          <label for="dateTo" style="color:var(--muted)">To</label>
          <input type="date" id="dateTo" />
        </div>
        <div class="right row">
          <button id="refreshBtn" class="ghost">Refresh</button>
          <a id="csvLink" href="#" download="bookings_export.csv"><button class="ghost">Export CSV</button></a>
        </div>
      </div>
    </div>

    <div class="card">
      <table id="bookingsTbl">
        <thead>
          <tr>
            <th>Ref</th>
            <th>Ward &amp; Staff</th>
            <th>Date &amp; Time</th>
            <th>Zone</th>
            <th>Trip</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="empty" class="empty" style="display:none">No bookings found.</div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const api = (location.hostname === "localhost" || location.hostname === "127.0.0.1") ? "http://localhost:4000" : "";

    const tbody = document.getElementById("tbody");
    const statusSel = document.getElementById("statusSel");
    const refreshBtn = document.getElementById("refreshBtn");
    const empty = document.getElementById("empty");
    const csvLink = document.getElementById("csvLink");
    const toastEl = document.getElementById("toast");
    const dateFromEl = document.getElementById("dateFrom");
    const dateToEl = document.getElementById("dateTo");
    const totalEl = document.getElementById("totalCount");

    function toast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      setTimeout(()=>toastEl.classList.remove("show"), 2200);
    }
    function esc(s){ return String(s ?? "").replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

    function toDDMMYY(iso){
      if(!iso) return "";
      const [y,m,d] = String(iso).split("-");
      if(!y||!m||!d) return iso;
      return `${d}-${m}-${y}`;
    }

    function statusChip(status){
      const s = status || "pending";
      if (s === "approved") return `<span class="pill approved">Approved</span>`;
      if (s === "declined") return `<span class="pill declined">Declined</span>`;
      return `<span class="pill pending">Pending</span>`;
    }

    function fmtWardStaff(b){
      const ward = b.wardName || "(no ward)";
      const staff = b.staffName || "";
      const phone = b.staffPhone || "";
      const wardPhone = b.wardPhone || "";
      return `<div class="staff">
        <strong>${esc(ward)}</strong>
        ${staff ? `<span>${esc(staff)}</span>` : ""}
        ${phone ? `<span>Staff: ${esc(phone)}</span>` : ""}
        ${wardPhone ? `<span>Ward: ${esc(wardPhone)}</span>` : ""}
      </div>`;
    }

    function fmtDateTime(b){
      const date = toDDMMYY(b.pickupDateISO);
      const time = b.onOffDutyTime || "";
      const shift = b.shiftType === "finish" ? "Finish" : "Start";
      return `<div>
        <div>${date || "—"} ${time ? " @ " + esc(time) : ""}</div>
        <div><span class="badge">${shift}</span></div>
      </div>`;
    }

    function fmtZones(b){
      const pz = b.pickup?.zone?.name || "";
      const dz = b.destination?.zone?.name || "";
      if (!pz && !dz) return "";
      if (pz === dz) return `<span class="zone">${esc(pz)}</span>`;
      return `<span class="zone">${esc(pz)} → ${esc(dz)}</span>`;
    }

    function fmtTrip(b){
      const pick = b.pickup?.formatted || "";
      const drop = b.destination?.formatted || "";
      const ret = b.requireReturn ? "Return required" : "";
      return `<div class="trip">
        ${esc(pick)}
        ${drop ? "<br>↓<br>" + esc(drop) : ""}
        ${ret ? "<br><span class='badge'>Return</span>" : ""}
      </div>`;
    }

    function renderRow(b){
      const refBlock = `
        <div class="ref">
          <span class="shortRef">${esc(b.shortRef || "—")}</span>
          <span class="legacyRef">${esc(b.reference || "")}</span>
        </div>`;
      const actApprove = `<button class="btn-approve" data-act="approve" data-id="${b._id}">Accept</button>`;
      const actDecline = `<button class="btn-decline" data-act="decline" data-id="${b._id}">Decline</button>`;
      const actDelete  = `<button class="btn-delete"  data-act="delete"  data-id="${b._id}">Delete</button>`;

      return `<tr data-id="${b._id}">
        <td>${refBlock}</td>
        <td>${fmtWardStaff(b)}</td>
        <td>${fmtDateTime(b)}</td>
        <td>${fmtZones(b)}</td>
        <td>${fmtTrip(b)}</td>
        <td>${statusChip(b.status)}</td>
        <td class="actions">${actApprove} ${actDecline} ${actDelete}</td>
      </tr>`;
    }

    function toCSV(items){
      const header = [
        "pickupDateISO","onOffDutyTime","shiftType","wardName","staffName","staffPhone",
        "pickup.formatted","pickup.zone.name","destination.formatted","destination.zone.name",
        "reference","requireReturn","isReturn","status","shortRef","declineReason"
      ];
      const rows = items.map(b => ([
        toDDMMYY(b.pickupDateISO),
        (b.onOffDutyTime || ""),
        (b.shiftType || ""),
        (b.wardName || "").replace(/,/g," "),
        (b.staffName || "").replace(/,/g," "),
        (b.staffPhone || "").replace(/,/g," "),
        (b.pickup?.formatted||"").replace(/,/g," "),
        (b.pickup?.zone?.name||"").replace(/,/g," "),
        (b.destination?.formatted||"").replace(/,/g," "),
        (b.destination?.zone?.name||"").replace(/,/g," "),
        (b.reference||""),
        b.requireReturn ? "TRUE" : "FALSE",
        b.isReturn ? "TRUE" : "FALSE",
        b.status||"",
        b.shortRef||"",
        (b.declineReason||"").replace(/,/g," ")
      ].join(",")));
      return [header.join(","), ...rows].join("\n");
    }

    async function load(){
      const wantsPending = statusSel.value === "pending";
      const qs = new URLSearchParams();
      if (!wantsPending && statusSel.value) qs.set("status", statusSel.value);
      if (dateFromEl && dateFromEl.value) qs.set("dateFrom", dateFromEl.value);
      if (dateToEl && dateToEl.value) qs.set("dateTo", dateToEl.value);
      qs.set("limit", "200");
      const url = `${api}/api/bookings?${qs.toString()}`;

      tbody.innerHTML = "";
      empty.style.display = "none";
      if (totalEl) totalEl.textContent = "";

      try{
        const r = await fetch(url);
        if(!r.ok) throw new Error("Failed to load bookings");
        const data = await r.json();
        let items = data.items || [];

        if (wantsPending) {
          items = items.filter(b =>
            (b.status === "pending") ||
            b.status === undefined ||
            b.status === null ||
            b.status === ""
          );
        }

        if (totalEl) totalEl.textContent = `Total: ${items.length}`;

        if (items.length === 0){
          empty.style.display = "block";

          // Even with no items, keep CSV export consistent
          const csvText = toCSV(items);
          const blob = new Blob([csvText], { type: "text/csv;charset=utf-8" });
          const urlObj = URL.createObjectURL(blob);
          csvLink.href = urlObj;
          csvLink.download = wantsPending ? "bookings_pending.csv" : "bookings_export.csv";

          return;
        }

        const frag = document.createDocumentFragment();
        for (const b of items){
          const tr = document.createElement("tr");
          tr.innerHTML = renderRow(b);
          frag.appendChild(tr);
        }
        tbody.appendChild(frag);

        if (wantsPending) {
          const csvText = toCSV(items);
          const blob = new Blob([csvText], { type: "text/csv;charset=utf-8" });
          const urlObj = URL.createObjectURL(blob);
          csvLink.href = urlObj;
          csvLink.download = "bookings_pending.csv";
        } else {
          csvLink.href = `${api}/api/bookings/export?${qs.toString()}`;
          csvLink.download = "bookings_export.csv";
        }
      } catch (err){
        console.error(err);
        toast("Failed to load bookings");
        empty.style.display = "block";
        if (totalEl) totalEl.textContent = "Total: 0";
      }
    }

    function grabRowBooking(row){
      const id = row.getAttribute("data-id");
      const shortRefEl = row.querySelector(".shortRef");
      const legacyRefEl = row.querySelector(".legacyRef");
      const tripEl = row.querySelector(".trip");
      const staffEl = row.querySelector(".staff");
      const dateTimeEl = row.querySelector("td:nth-child(3)");
      const tripLines = (tripEl?.innerText || "").split("\n");
      const staffLines = (staffEl?.innerText || "").split("\n");
      const dateLine = (dateTimeEl?.innerText || "").split("\n")[0] || "";
      const [date, time] = dateLine.split("@").map(s => s.trim());
      const shortRef = shortRefEl?.innerText || "";
      const legacyRef = legacyRefEl?.innerText || "";
      const pick = (tripLines[0]||"").trim();
      const drop = (tripLines[1]||"").trim();
      return {
        _id:id,
        shortRef, reference: legacyRef, pickupDateISO: date, onOffDutyTime: time,
        pickup:{ formatted: pick }, destination:{ formatted: drop },
        staffName: staffLines[1] || ""
      };
    }

    function buildApproveMessage(row){
      const b = grabRowBooking(row);
      const dateNice = toDDMMYY(b.pickupDateISO);
      return (
        `Your request for your Christmas staff booking for Derriford Hospital on ${dateNice} at ${b.onOffDutyTime}. ` +
        `Pick up: ${b.pickup.formatted}. Drop off: ${b.destination.formatted}. In the name ${b.staffName} has been approved. ` +
        `Your reference number is ${b.reference}.`
      );
    }

    function buildDeclineMessage(row, reason){
      const b = grabRowBooking(row);
      const dateNice = toDDMMYY(b.pickupDateISO);
      return (
        `Your request for your Christmas staff booking for Derriford Hospital on ${dateNice} at ${b.onOffDutyTime}. ` +
        `Pick up: ${b.pickup.formatted}. Drop off: ${b.destination.formatted}. In the name ${b.staffName} has been declined. ` +
        `Reason: ${reason}`
      );
    }

    async function approve(id, row){
      const r = await fetch(`${api}/api/bookings/${id}/approve`, { method:"PATCH" });
      const js = await r.json();
      if(!r.ok){ toast(js.error||"Approve failed"); return; }
      toast("Approved ✔");
      updateRowFromPayload(row, js.booking);
      const msg = buildApproveMessage(row);
      console.log("APPROVE SMS:", msg);
    }

    async function decline(id, row){
      const reason = prompt("Reason for declining?");
      if(reason === null) return;
      const trimmed = String(reason).trim();
      if (!trimmed){ toast("Decline reason required"); return; }

      const r = await fetch(`${api}/api/bookings/${id}/decline`, {
        method:"PATCH", headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ reason: trimmed })
      });
      const js = await r.json();
      if(!r.ok){ toast(js.error||"Decline failed"); return; }
      toast("Declined ✖");
      updateRowFromPayload(row, js.booking);
      const msg = buildDeclineMessage(row, trimmed);
      console.log("DECLINE SMS:", msg);
    }

    async function deleteBooking(id, row){
      if(!confirm("Delete this booking? This cannot be undone.")) return;
      const r = await fetch(`${api}/api/bookings/${id}`, { method:"DELETE" });
      const js = await r.json();
      if(!r.ok){ toast(js.error||"Delete failed"); return; }
      row.remove();
      if (!tbody.children.length) empty.style.display = "block";
      toast("Deleted 🗑");
    }

    function updateRowFromPayload(row, b){
      const cells = row.querySelectorAll("td");
      cells[0].innerHTML = `<div class="ref">
        <span class="shortRef">${esc(b.shortRef||"—")}</span>
        <span class="legacyRef">${esc(b.reference||"")}</span></div>`;
      cells[5].innerHTML = statusChip(b.status);
    }

    tbody.addEventListener("click", (e)=>{
      const btn = e.target.closest("button");
      if(!btn) return;
      const id = btn.getAttribute("data-id");
      const row = btn.closest("tr");
      const act = btn.getAttribute("data-act");
      if (act === "approve") approve(id, row);
      else if (act === "decline") decline(id, row);
      else if (act === "delete") deleteBooking(id, row);
    });

    statusSel.addEventListener("change", load);
    refreshBtn.addEventListener("click", load);
    if (dateFromEl) dateFromEl.addEventListener("change", load);
    if (dateToEl) dateToEl.addEventListener("change", load);
    load();
  </script>
</body>
</html>
